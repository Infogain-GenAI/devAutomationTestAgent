name: 'IGNIS Automation Test Agent (Container Deployment)'

# ============================================================================
# REFERENCE: Corrected Container Deployment Workflow
# ============================================================================
# This is the CORRECTED version of the workflow for repositories under test
# Copy this to your repository as .github/workflows/ignis-automation.yml
# ============================================================================

on:
  push:
    branches:
      - '**'  # Trigger on any branch
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to test (the base branch for fix PRs)'
        required: false
        default: 'main'
      ai-provider:
        description: 'AI provider (claude, openai, gemini)'
        required: false
        default: 'openai'
        type: choice
        options:
          - openai
          - claude
          - gemini
      ai-api-key:
        description: 'API key for the AI provider'
        required: true
      max-iterations:
        description: 'Maximum fix-and-retest iterations'
        required: false
        default: '3'
      test-types:
        description: 'Comma-separated test types (e2e, api, visual, accessibility, performance)'
        required: false
        default: 'e2e,api,visual,accessibility,performance'
      app-url:
        description: 'URL of the running target application (skip auto-start)'
        required: false
      auto-start-app:
        description: 'Auto-start the target app from the repo'
        required: false
        default: true
        type: boolean
      app-start-command:
        description: 'Custom command to start the target app'
        required: false

jobs:
  run-automation-tests:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}

      # ============================================================================
      # AZURE CONTAINER REGISTRY (ACR) LOGIN
      # ============================================================================
      
      - name: Login to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_REGISTRY_URL }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      # ============================================================================
      # PULL AUTOMATION AGENT CONTAINER IMAGE
      # ============================================================================
      
      - name: Pull IGNIS Automation Agent from ACR
        run: |
          ACR_REGISTRY="${{ secrets.ACR_REGISTRY_URL }}"
          IMAGE_NAME="${{ vars.ACR_IMAGE_NAME || 'ignis-automation-agent' }}"
          IMAGE_TAG="${{ vars.ACR_IMAGE_TAG || 'latest' }}"
          FULL_IMAGE="${ACR_REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG}"
          
          echo "🐳 Pulling container image: ${FULL_IMAGE}"
          docker pull "${FULL_IMAGE}"
          
          echo "✅ Image pulled successfully"
          docker images | grep "${IMAGE_NAME}" || true

      # ============================================================================
      # RUN AUTOMATION AGENT CONTAINER (CORRECTED)
      # ============================================================================
      # KEY FIXES:
      # 1. Working directory (-w) stays at /app (agent code location)
      # 2. REPO_PATH points to /workspace (mounted test repo)
      # 3. All paths are container paths, not host paths
      # ============================================================================
      
      - name: Run IGNIS Automation Test Agent Container
        run: |
          ACR_REGISTRY="${{ secrets.ACR_REGISTRY_URL }}"
          IMAGE_NAME="${{ vars.ACR_IMAGE_NAME || 'ignis-automation-agent' }}"
          IMAGE_TAG="${{ vars.ACR_IMAGE_TAG || 'latest' }}"
          FULL_IMAGE="${ACR_REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG}"
          
          echo "🚀 Starting IGNIS Automation Test Agent..."
          
          docker run --rm \
            --name ignis-automation-agent \
            -v "${{ github.workspace }}:/workspace" \
            -e REPO_PATH="/workspace" \
            -e REPO_BRANCH="${{ github.event.inputs.branch || github.ref_name }}" \
            -e GITHUB_TOKEN="${{ github.token }}" \
            -e AI_PROVIDER="${{ github.event.inputs.ai-provider || vars.AI_PROVIDER || 'openai' }}" \
            -e AI_API_KEY="${{ secrets.AI_API_KEY || github.event.inputs.ai-api-key }}" \
            -e OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY || secrets.AI_API_KEY || github.event.inputs.ai-api-key }}" \
            -e CLAUDE_API_KEY="${{ secrets.CLAUDE_API_KEY || secrets.AI_API_KEY || github.event.inputs.ai-api-key }}" \
            -e GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY || secrets.AI_API_KEY || github.event.inputs.ai-api-key }}" \
            -e MAX_ITERATIONS="${{ github.event.inputs.max-iterations || vars.MAX_ITERATIONS || '3' }}" \
            -e TEST_TYPES="${{ github.event.inputs.test-types || vars.TEST_TYPES || 'e2e,api,visual,accessibility,performance' }}" \
            -e APP_URL="${{ github.event.inputs.app-url || vars.APP_URL || '' }}" \
            -e AUTO_START_APP="${{ github.event.inputs.auto-start-app || vars.AUTO_START_APP || 'true' }}" \
            -e APP_START_COMMAND="${{ github.event.inputs.app-start-command || vars.APP_START_COMMAND || '' }}" \
            -e APP_SECRETS="${{ github.event.inputs.app-secrets || secrets.APP_SECRETS || '' }}" \
            -e GITHUB_WORKSPACE="/workspace" \
            "${FULL_IMAGE}"
          
          echo "✅ Automation testing completed"

      # ============================================================================
      # UPLOAD TEST ARTIFACTS
      # ============================================================================
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ignis-test-results
          path: |
            generated-tests/
            test-results/
            playwright-report/
            reports/
          retention-days: 30

      # ============================================================================
      # CONTAINER PATH EXPLANATION:
      # ============================================================================
      # HOST                          CONTAINER
      # ============================  ================================
      # ${{ github.workspace }}   →   /workspace (test repo)
      # N/A                       →   /app (agent code - from image)
      # N/A                       →   /app/workspace (agent work dir)
      # N/A                       →   /app/logs (agent logs)
      # N/A                       →   /app/reports (agent reports)
      #
      # The container runs from /app (WORKDIR), not /workspace!
      # This allows the agent to access both its own code and the test repo.
      # ============================================================================
