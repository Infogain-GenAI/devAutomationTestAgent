name: Build and Push Docker Image to ACR

on:
  push:
    branches:
      - main  # Change to your branch name
  workflow_dispatch:

env:
  ACR_NAME: ignisnonprodacr                # Your Azure Container Registry name
  ACR_LOGIN_SERVER: ignisnonprodacr.azurecr.io
  REPOSITORY_NAME: automationtestagent      # Repository name in ACR

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure CLI login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      
      - name: Rotate ACR image tags BEFORE build (backup current latest)
        run: |
          chmod +x .github/scripts/rotate-tags.sh
          .github/scripts/rotate-tags.sh "$ACR_NAME" "$REPOSITORY_NAME" "$MAX_IMAGES_TO_MAINTAIN"
        env:
          ACR_NAME: ${{ env.ACR_NAME }}
          REPOSITORY_NAME: ${{ env.REPOSITORY_NAME }}
          MAX_IMAGES_TO_MAINTAIN: ${{ env.MAX_IMAGES_TO_MAINTAIN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to container registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}  

      # - name: Set custom image tag
      #   id: set_tag
      #   run: |
      #     SHORT_SHA=$(echo "${GITHUB_SHA}" | cut -c1-7)
      #     BRANCH=$(echo "${GITHUB_REF_NAME}" | tr '/' '-')
      #     DATE=$(date +'%Y%m%d')
      #     TIME=$(date +'%H%M%S')
      #     IMAGE_TAG="${BRANCH}-${SHORT_SHA}-${DATE}-${TIME}"
      #     echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV
      #     echo "image_tag=$IMAGE_TAG" >> $GITHUB_OUTPUT
      # pushed using commit id tag

      # Removed unique image tag step; always use 'latest' tag

      - name: Build and push Docker image
        uses: docker/build-push-action@v3
        with:
          context: .
          push: true
          no-cache: true
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/${{ env.REPOSITORY_NAME }}:latest
          file: ./Dockerfile
