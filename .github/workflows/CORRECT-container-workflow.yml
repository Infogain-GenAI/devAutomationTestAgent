name: 'IGNIS Automation Test Agent'

# ============================================================================
# TRIGGER CONFIGURATION
# ============================================================================
on:
  push:
    branches:
      - '**'
    branches-ignore:
      - 'ignis/**'
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to test (the base branch for fix PRs)'
        required: false
        default: 'main'
      ai-provider:
        description: 'AI provider (claude, openai, gemini)'
        required: false
        default: 'openai'
        type: choice
        options:
          - openai
          - claude
          - gemini
      run-mode:
        description: 'Pipeline run mode'
        required: false
        default: 'full'
        type: choice
        options:
          - full
          - generation
          - validation
          - execution
      run-agent:
        description: 'Run a single sub-agent independently (overrides run-mode)'
        required: false
        type: choice
        options:
          - ''
          - generation
          - validation
          - execution
      max-iterations:
        description: 'Maximum main pipeline iterations'
        required: false
        default: '3'
      sub-agent-max-iterations:
        description: 'Maximum iterations per sub-agent (1-15)'
        required: false
        default: '5'
      coverage-threshold:
        description: 'Target coverage percentage (1-100)'
        required: false
        default: '95'
      test-types:
        description: 'Comma-separated test types (unit,e2e,api,integration,visual,accessibility,performance)'
        required: false
        default: 'unit,e2e,api'
      auto-start-app:
        description: 'Auto-start the target app from the repo'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      app-start-command:
        description: 'Custom command to start the target app'
        required: false
      app-url:
        description: 'URL of the running target application (skip auto-start)'
        required: false
      skip-pr:
        description: 'Skip push and PR creation'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

# ============================================================================
# SECRETS & VARIABLES REQUIRED (All prefixed with ATA_ to avoid conflicts)
# ============================================================================
# Repository Secrets (Settings → Secrets and variables → Actions → Secrets):
#   - ATA_ACR_REGISTRY_URL    : Azure Container Registry URL (e.g., myregistry.azurecr.io)
#   - ATA_ACR_USERNAME        : ACR username / service principal client ID
#   - ATA_ACR_PASSWORD        : ACR password / service principal client secret
#   - ATA_AI_API_KEY          : Required primary AI API key (used for all providers by default)
#   - ATA_OPENAI_API_KEY      : (Optional) Overrides ATA_AI_API_KEY for OpenAI only
#   - ATA_CLAUDE_API_KEY      : (Optional) Overrides ATA_AI_API_KEY for Claude only
#   - ATA_GEMINI_API_KEY      : (Optional) Overrides ATA_AI_API_KEY for Gemini only
#   - ATA_CODE_GENERATION_CLAUDE_API_KEY : (Optional) Separate Claude key for code generation
#   - ATA_APP_SECRETS         : (Optional) JSON string of app environment variables
#   - ATA_GITHUB_PAT          : GitHub Personal Access Token for PR creation
#
# Repository Variables (Settings → Secrets and variables → Actions → Variables):
#   - ATA_ACR_IMAGE_NAME      : Container image name (default: automationtestagent)
#   - ATA_ACR_IMAGE_TAG       : Image tag (default: latest)
#   - ATA_AI_PROVIDER         : Default AI provider (default: openai)
#   - ATA_TEST_TYPES          : Default test types (default: unit,e2e,api)
#   - ATA_AUTO_START_APP      : Auto-start flag (default: true)
#   - ATA_COVERAGE_THRESHOLD  : Target coverage % (default: 95)
#   - ATA_MAX_ITERATIONS      : Max main pipeline iterations (default: 3)
#   - ATA_SUB_AGENT_MAX_ITERATIONS : Max sub-agent iterations (default: 5)
#   - ATA_APP_URL             : Target application URL (optional)
#   - ATA_APP_START_COMMAND   : Custom app start command (optional)
#   - ATA_LOG_LEVEL           : Log level (default: info)
#   - ATA_CODE_GENERATION_CLAUDE_MODEL : Claude model for code gen (default: claude-sonnet-4-20250514)
#
# ============================================================================
# PERMISSIONS REQUIRED
# ============================================================================
# This workflow requires the following permissions to function properly:
#   - contents: write       → Push commits and create branches
#   - pull-requests: write  → Create pull requests with test results
#   - issues: write        → Create issues for test failures (optional)
#
# These are configured in the job's 'permissions' section below.
# ============================================================================

jobs:
  run-automation-tests:
    runs-on: ubuntu-latest
    
    # ============================================================================
    # PERMISSIONS CONFIGURATION
    # ============================================================================
    # These permissions allow the agent to create PRs and push branches
    # Required for: Branch creation, PR creation, commit pushing
    # ============================================================================
    permissions:
      contents: write        # Required to push commits and branches
      pull-requests: write   # Required to create pull requests
      issues: write         # Required for issue creation (optional)
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}
          token: ${{ secrets.ATA_GITHUB_PAT || github.token }}
          persist-credentials: false

      - name: Login to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ATA_ACR_REGISTRY_URL }}
          username: ${{ secrets.ATA_ACR_USERNAME }}
          password: ${{ secrets.ATA_ACR_PASSWORD }}

      - name: Pull IGNIS Automation Agent Image
        run: |
          set -euo pipefail
          ACR_REGISTRY="${{ secrets.ATA_ACR_REGISTRY_URL }}"
          IMAGE_NAME="${{ vars.ATA_ACR_IMAGE_NAME || 'automationtestagent' }}"
          IMAGE_TAG="${{ vars.ATA_ACR_IMAGE_TAG || 'latest' }}"
          FULL_IMAGE="${ACR_REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG}"
          
          echo "🐳 Pulling container image: ${FULL_IMAGE}"
          docker pull "${FULL_IMAGE}"
          echo "✅ Image pulled successfully"

      - name: Validate Workflow Inputs
        run: |
          set -euo pipefail

          BRANCH="${{ github.event.inputs.branch || github.ref_name }}"
          AI_PROVIDER="${{ github.event.inputs.ai-provider || vars.ATA_AI_PROVIDER || 'openai' }}"
          TEST_TYPES="${{ github.event.inputs.test-types || vars.ATA_TEST_TYPES || 'unit,e2e,api' }}"
          MAX_ITERATIONS="${{ github.event.inputs.max-iterations || vars.ATA_MAX_ITERATIONS || '3' }}"
          SUB_AGENT_MAX_ITERATIONS="${{ github.event.inputs.sub-agent-max-iterations || vars.ATA_SUB_AGENT_MAX_ITERATIONS || '5' }}"
          COVERAGE_THRESHOLD="${{ github.event.inputs.coverage-threshold || vars.ATA_COVERAGE_THRESHOLD || '95' }}"
          APP_URL="${{ github.event.inputs.app-url || vars.ATA_APP_URL || '' }}"
          AI_API_KEY="${{ secrets.ATA_AI_API_KEY }}"

          validate_numeric_range() {
            local value="$1"
            local min="$2"
            local max="$3"
            local label="$4"

            if ! [[ "$value" =~ ^[0-9]+$ ]]; then
              echo "❌ Invalid ${label}: '$value' is not numeric"
              exit 1
            fi

            if [ "$value" -lt "$min" ] || [ "$value" -gt "$max" ]; then
              echo "❌ Invalid ${label}: '$value' is outside ${min}-${max}"
              exit 1
            fi
          }

          if [ -z "$AI_API_KEY" ]; then
            echo "❌ Missing required secret: ATA_AI_API_KEY"
            exit 1
          fi

          if ! [[ "$BRANCH" =~ ^[A-Za-z0-9._/-]+$ ]] || [[ "$BRANCH" == *..* ]]; then
            echo "❌ Invalid branch: '$BRANCH'"
            exit 1
          fi

          case "$AI_PROVIDER" in
            openai|claude|gemini) ;;
            *)
              echo "❌ Invalid AI provider: '$AI_PROVIDER' (allowed: openai, claude, gemini)"
              exit 1
              ;;
          esac

          validate_numeric_range "$MAX_ITERATIONS" 1 10 "max-iterations"
          validate_numeric_range "$SUB_AGENT_MAX_ITERATIONS" 1 15 "sub-agent-max-iterations"
          validate_numeric_range "$COVERAGE_THRESHOLD" 1 100 "coverage-threshold"

          VALID_TEST_TYPES="unit e2e api integration visual accessibility performance"
          IFS=',' read -r -a REQUESTED_TEST_TYPES <<< "$TEST_TYPES"
          for t in "${REQUESTED_TEST_TYPES[@]}"; do
            t="${t//[[:space:]]/}"
            if [ -z "$t" ]; then
              echo "❌ Invalid test-types: empty value found"
              exit 1
            fi
            if ! echo " $VALID_TEST_TYPES " | grep -q " ${t} "; then
              echo "❌ Invalid test type: '$t'"
              exit 1
            fi
          done

          if [ -n "$APP_URL" ] && ! [[ "$APP_URL" =~ ^https?:// ]]; then
            echo "❌ Invalid app-url: '$APP_URL' (must start with http:// or https://)"
            exit 1
          fi

          echo "✅ Workflow input validation passed"

      # ════════════════════════════════════════════════════════════════════════
      # RUN IGNIS AUTOMATION TEST AGENT
      # ════════════════════════════════════════════════════════════════════════
      # CRITICAL: Container runs in DETACHED mode (-d) so we can:
      #   1. Stream logs in real-time with docker logs -f
      #   2. Wait for completion with docker wait
      #   3. Get the actual exit code from the agent process
      #   4. Access logs/results written to workspace volume
      #
      # The container entrypoint sets LOG_DIR to /workspace/logs so all logs
      # are written to the mounted volume and accessible after container exits.
      # ════════════════════════════════════════════════════════════════════════
      
      - name: Run IGNIS Automation Test Agent
        id: run-agent
        run: |
          set -euo pipefail

          ACR_REGISTRY="${{ secrets.ATA_ACR_REGISTRY_URL }}"
          IMAGE_NAME="${{ vars.ATA_ACR_IMAGE_NAME || 'automationtestagent' }}"
          IMAGE_TAG="${{ vars.ATA_ACR_IMAGE_TAG || 'latest' }}"
          FULL_IMAGE="${ACR_REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG}"
          CONTAINER_NAME="ignis-agent-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          EXECUTION_TIMEOUT_SECONDS=3600

          BRANCH="${{ github.event.inputs.branch || github.ref_name }}"
          AI_PROVIDER="${{ github.event.inputs.ai-provider || vars.ATA_AI_PROVIDER || 'openai' }}"
          TEST_TYPES="${{ github.event.inputs.test-types || vars.ATA_TEST_TYPES || 'unit,e2e,api' }}"
          MAX_ITERATIONS="${{ github.event.inputs.max-iterations || vars.ATA_MAX_ITERATIONS || '3' }}"
          COVERAGE_THRESHOLD="${{ github.event.inputs.coverage-threshold || vars.ATA_COVERAGE_THRESHOLD || '95' }}"
          RUN_MODE="${{ github.event.inputs.run-mode || 'full' }}"
          RUN_AGENT="${{ github.event.inputs.run-agent || 'N/A' }}"
          
          echo "════════════════════════════════════════════════════════════════════════"
          echo "🚀 IGNIS Automation Test Agent - Starting Execution"
          echo "════════════════════════════════════════════════════════════════════════"
          echo ""
          echo "📦 Image:        ${FULL_IMAGE}"
          echo "📁 Workspace:    ${{ github.workspace }}"
          echo "🌿 Branch:       ${BRANCH}"
          echo "🤖 AI Provider:  ${AI_PROVIDER}"
          echo "🧪 Test Types:   ${TEST_TYPES}"
          echo "🔄 Iterations:   ${MAX_ITERATIONS}"
          echo "🎯 Coverage:     ${COVERAGE_THRESHOLD}%"
          echo "📋 Run Mode:     ${RUN_MODE}"
          echo "🔧 Run Agent:    ${RUN_AGENT}"
          echo ""
          echo "════════════════════════════════════════════════════════════════════════"
          echo ""
          
          # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
          # Start container in DETACHED mode (-d)
          # This allows us to stream logs AND capture exit code properly
          # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
          CONTAINER_ID=$(docker run -d \
            --name "${CONTAINER_NAME}" \
            -v "${{ github.workspace }}:/workspace" \
            -e REPO_PATH="/workspace" \
            -e REPO_BRANCH="${{ github.event.inputs.branch || github.ref_name }}" \
            -e GITHUB_TOKEN="${{ secrets.ATA_GITHUB_PAT || github.token }}" \
            -e GITHUB_PAT="${{ secrets.ATA_GITHUB_PAT || '' }}" \
            -e GITHUB_WORKSPACE="/workspace" \
            -e GITHUB_REPOSITORY="${{ github.repository }}" \
            -e AI_PROVIDER="${{ github.event.inputs.ai-provider || vars.ATA_AI_PROVIDER || 'openai' }}" \
            -e AI_API_KEY="${{ secrets.ATA_AI_API_KEY }}" \
            -e OPENAI_API_KEY="${{ secrets.ATA_OPENAI_API_KEY || secrets.ATA_AI_API_KEY }}" \
            -e CLAUDE_API_KEY="${{ secrets.ATA_CLAUDE_API_KEY || secrets.ATA_AI_API_KEY }}" \
            -e GEMINI_API_KEY="${{ secrets.ATA_GEMINI_API_KEY || secrets.ATA_AI_API_KEY }}" \
            -e CODE_GENERATION_CLAUDE_API_KEY="${{ secrets.ATA_CODE_GENERATION_CLAUDE_API_KEY || '' }}" \
            -e CODE_GENERATION_CLAUDE_MODEL="${{ vars.ATA_CODE_GENERATION_CLAUDE_MODEL || 'claude-sonnet-4-20250514' }}" \
            -e RUN_MODE="${{ github.event.inputs.run-mode || 'full' }}" \
            -e RUN_AGENT="${{ github.event.inputs.run-agent || '' }}" \
            -e MAX_ITERATIONS="${{ github.event.inputs.max-iterations || vars.ATA_MAX_ITERATIONS || '3' }}" \
            -e SUB_AGENT_MAX_ITERATIONS="${{ github.event.inputs.sub-agent-max-iterations || vars.ATA_SUB_AGENT_MAX_ITERATIONS || '5' }}" \
            -e COVERAGE_THRESHOLD="${{ github.event.inputs.coverage-threshold || vars.ATA_COVERAGE_THRESHOLD || '95' }}" \
            -e TEST_TYPES="${{ github.event.inputs.test-types || vars.ATA_TEST_TYPES || 'unit,e2e,api' }}" \
            -e APP_URL="${{ github.event.inputs.app-url || vars.ATA_APP_URL || '' }}" \
            -e AUTO_START_APP="${{ github.event.inputs.auto-start-app || vars.ATA_AUTO_START_APP || 'true' }}" \
            -e APP_START_COMMAND="${{ github.event.inputs.app-start-command || vars.ATA_APP_START_COMMAND || '' }}" \
            -e APP_SECRETS="${{ secrets.ATA_APP_SECRETS || '' }}" \
            -e SKIP_PR="${{ github.event.inputs.skip-pr || 'false' }}" \
            -e LOG_LEVEL="${{ vars.ATA_LOG_LEVEL || 'info' }}" \
            -e NODE_ENV="production" \
            -e HEADLESS="true" \
            -e CI="true" \
            -e PLAYWRIGHT_HEADLESS="1" \
            -e PLAYWRIGHT_BROWSERS_PATH="/ms-playwright" \
            -e DISPLAY="" \
            "${FULL_IMAGE}")
          
          echo "🐳 Container started: ${CONTAINER_ID:0:12}"
          echo ""
          
          # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
          # STREAM CONTAINER LOGS IN REAL-TIME
          # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
          # docker logs -f follows the container output until it exits
          # This is how we see ALL agent output including:
          #   - Code analysis results
          #   - Test generation details
          #   - Unit test execution results
          #   - E2E/API test results
          #   - Fix iterations
          #   - Final summary
          # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📋 AGENT EXECUTION LOG:"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          docker logs -f "${CONTAINER_NAME}" 2>&1 &
          LOGS_PID=$!

          if ! EXIT_CODE=$(timeout "${EXECUTION_TIMEOUT_SECONDS}" docker wait "${CONTAINER_NAME}"); then
            echo "⏱️ Agent timed out after ${EXECUTION_TIMEOUT_SECONDS}s. Attempting to stop container..."
            docker kill "${CONTAINER_NAME}" >/dev/null 2>&1 || true
            EXIT_CODE=124
          fi

          wait "${LOGS_PID}" || true
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          
          echo "════════════════════════════════════════════════════════════════════════"
          echo "🏁 Agent Exit Code: ${EXIT_CODE}"
          echo "════════════════════════════════════════════════════════════════════════"
          echo ""
          
          # Cleanup container
          if docker rm "${CONTAINER_NAME}" >/dev/null 2>&1; then
            echo "🧹 Container cleanup complete"
          else
            echo "⚠️ Container cleanup skipped (container already removed)"
          fi
          
          # Exit with the agent's actual exit code
          if [ "${EXIT_CODE}" -eq 0 ]; then
            echo "✅ IGNIS Automation Test Agent completed SUCCESSFULLY"
            exit 0
          else
            echo "❌ IGNIS Automation Test Agent FAILED (exit code: ${EXIT_CODE})"
            exit "${EXIT_CODE}"
          fi

      # ════════════════════════════════════════════════════════════════════════
      # DISPLAY TEST RESULTS (always runs, even on failure)
      # ════════════════════════════════════════════════════════════════════════

      - name: Display Test Results & Analysis Summary
        if: always()
        run: |
          echo ""
          echo "════════════════════════════════════════════════════════════════════════"
          echo "📊 TEST RESULTS & ARTIFACTS SUMMARY"
          echo "════════════════════════════════════════════════════════════════════════"
          echo ""
          
          # Check for logs directory (written to workspace volume by container)
          if [ -d "${{ github.workspace }}/logs" ]; then
            echo "✅ Logs directory found:"
            ls -la "${{ github.workspace }}/logs/" 2>/dev/null
            echo ""
            
            # Display run summary
            SUMMARY_FILE=$(ls -t ${{ github.workspace }}/logs/run-summary-*.log 2>/dev/null | head -1)
            if [ -n "$SUMMARY_FILE" ]; then
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              echo "📄 RUN SUMMARY:"
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              cat "$SUMMARY_FILE"
              echo ""
            fi
            
            # Display combined.log (last 200 lines for full execution detail)
            if [ -f "${{ github.workspace }}/logs/combined.log" ]; then
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              echo "📄 FULL EXECUTION LOG (last 200 lines):"
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              tail -200 "${{ github.workspace }}/logs/combined.log"
              echo ""
            fi
            
            # Display unit test results
            UNIT_RESULT=$(ls -t ${{ github.workspace }}/logs/unit-test-results-*.log 2>/dev/null | head -1)
            if [ -n "$UNIT_RESULT" ]; then
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              echo "🧪 UNIT TEST RESULTS:"
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              cat "$UNIT_RESULT"
              echo ""
            fi
            
            # Display E2E/API test results
            TEST_RESULT=$(ls -t ${{ github.workspace }}/logs/test-results-*.log 2>/dev/null | head -1)
            if [ -n "$TEST_RESULT" ]; then
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              echo "🎭 E2E/API TEST RESULTS:"
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              cat "$TEST_RESULT"
              echo ""
            fi
            
            # Display errors if any
            if [ -f "${{ github.workspace }}/logs/error.log" ] && [ -s "${{ github.workspace }}/logs/error.log" ]; then
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              echo "❌ ERROR LOG:"
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              cat "${{ github.workspace }}/logs/error.log"
              echo ""
            fi
          else
            echo "⚠️ No logs directory found at workspace root."
            echo "   This means the container exited before creating logs."
            echo "   Check the 'AGENT EXECUTION LOG' step above for container output."
            echo ""
          fi
          
          # List generated tests
          if [ -d "${{ github.workspace }}/generated-tests" ]; then
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "✅ GENERATED TEST FILES:"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            find "${{ github.workspace }}/generated-tests" -type f \( -name "*.spec.js" -o -name "*.test.js" -o -name "*.spec.ts" -o -name "*.test.ts" \) | while read f; do
              echo "   📝 $(basename $f)"
            done
            echo ""
            echo "   Total files:"
            find "${{ github.workspace }}/generated-tests" -type f | wc -l
            echo ""
          fi
          
          # Check for test-results summary
          if [ -f "${{ github.workspace }}/test-results/ignis-summary.json" ]; then
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "📊 IGNIS SUMMARY JSON:"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            cat "${{ github.workspace }}/test-results/ignis-summary.json" | python3 -m json.tool 2>/dev/null || cat "${{ github.workspace }}/test-results/ignis-summary.json"
            echo ""
          fi

      # ════════════════════════════════════════════════════════════════════════
      # UPLOAD ALL ARTIFACTS
      # ════════════════════════════════════════════════════════════════════════

      - name: Upload All Test Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ignis-automation-results-${{ github.run_number }}
          path: |
            logs/
            generated-tests/
            test-results/
            reports/
            playwright-report/
          if-no-files-found: warn
          retention-days: 30

      # ════════════════════════════════════════════════════════════════════════
      # FAIL JOB IF AGENT FAILED
      # ════════════════════════════════════════════════════════════════════════
      
      - name: Verify Agent Success
        if: steps.run-agent.outcome == 'failure'
        run: |
          echo "❌ ════════════════════════════════════════════════════════════════════════"
          echo "❌ IGNIS AUTOMATION TEST AGENT - EXECUTION FAILED"
          echo "❌ ════════════════════════════════════════════════════════════════════════"
          echo ""
          echo "The automation test agent completed with errors."
          echo ""
          echo "Exit Code 1 typically means:"
          echo "   • Partial Success: Tests were generated but some failed"
          echo "   • PR Creation Failed: Branch pushed but PR couldn't be created"
          echo "   • Test Execution Issues: Tests generated but couldn't run"
          echo ""
          echo "✅ GOOD NEWS: With the updated permissions, PR creation should now work!"
          echo ""
          echo "📋 What to Check:"
          echo ""
          echo "   1. 🔀 PULL REQUEST:"
          echo "      • Check if a PR was created in the 'Pull Request Information' step"
          echo "      • Look for branch 'ignis/fix-*' in your repository"
          echo "      • Visit: https://github.com/${{ github.repository }}/pulls"
          echo ""
          echo "   2. 🧪 TEST RESULTS:"
          echo "      • Review 'Display Test Results' step for test execution details"
          echo "      • Check if tests were generated (should see 'Generated X test files')"
          echo "      • Download artifacts to see full test output"
          echo ""
          echo "   3. 📊 LOGS & ARTIFACTS:"
          echo "      • Download the 'ignis-automation-results' artifact"
          echo "      • Review logs/combined.log for full execution trace"
          echo "      • Check logs/error.log if it exists"
          echo ""
          echo "   4. 🔑 COMMON FIXES:"
          echo "      • AI API Key Issues → Verify ATA_AI_API_KEY is valid (not expired)"
          echo "      • App Won't Start → Check APP_START_COMMAND or set APP_URL"
          echo "      • Tests Don't Run → May need Playwright config adjustments"
          echo "      • PR Not Created → Now fixed with permissions! Re-run workflow"
          echo ""
          echo "💡 NEXT STEPS:"
          echo ""
          echo "   If you see 'Failed to create PR: GitHub Actions is not permitted':"
          echo "   ✅ This is now FIXED! The workflow has 'pull-requests: write' permission."
          echo "   ✅ Re-run this workflow and PR creation should succeed."
          echo ""
          echo "   If tests were generated but didn't execute:"
          echo "   • This is common on first run (0 tests executed)"
          echo "   • Agent creates tests, commits them, and pushes branch"
          echo "   • You can run tests manually or let agent iterate"
          echo ""
          echo "════════════════════════════════════════════════════════════════════════"
          echo ""
          exit 1
      
      # ════════════════════════════════════════════════════════════════════════
      # PULL REQUEST SUMMARY
      # ════════════════════════════════════════════════════════════════════════
      
      - name: Display Pull Request Information
        if: always()
        run: |
          echo ""
          echo "════════════════════════════════════════════════════════════════════════"
          echo "🔀 PULL REQUEST INFORMATION"
          echo "════════════════════════════════════════════════════════════════════════"
          echo ""
          
          # Check if PR info was written by the agent
          if [ -f "${{ github.workspace }}/logs/pr-info.txt" ]; then
            cat "${{ github.workspace }}/logs/pr-info.txt"
          else
            # Check recent git branches
            echo "🌿 Branches created by IGNIS agent:"
            cd "${{ github.workspace }}"
            git branch -a | grep "ignis/fix-" | tail -5 || echo "   No IGNIS branches found locally"
            echo ""
            
            # Check if there are unpushed commits
            CURRENT_BRANCH=$(git rev-parse --abbrev-ref HEAD 2>/dev/null)
            if [ -n "$CURRENT_BRANCH" ] && [ "$CURRENT_BRANCH" != "HEAD" ]; then
              echo "Current branch: $CURRENT_BRANCH"
              
              # Check for remote branch
              if git ls-remote --heads origin "$CURRENT_BRANCH" 2>/dev/null | grep -q "$CURRENT_BRANCH"; then
                echo "✅ Branch pushed to remote: origin/$CURRENT_BRANCH"
                echo ""
                echo "🔗 Check for PR at:"
                echo "   https://github.com/${{ github.repository }}/pulls?q=is%3Apr+head%3A$CURRENT_BRANCH"
              else
                echo "⚠️ Branch exists locally but not pushed to remote"
              fi
            fi
          fi
          
          # Check run summary for PR URL
          SUMMARY_FILE=$(ls -t ${{ github.workspace }}/logs/run-summary-*.log 2>/dev/null | head -1)
          if [ -n "$SUMMARY_FILE" ]; then
            PR_URL=$(grep -oP 'prUrl["\s:]+\K[^",\s]+' "$SUMMARY_FILE" 2>/dev/null || echo "")
            if [ -n "$PR_URL" ] && [ "$PR_URL" != "null" ]; then
              echo ""
              echo "✅ Pull Request Created:"
              echo "   $PR_URL"
              echo ""
              echo "::notice title=Pull Request Created::$PR_URL"
            fi
          fi
          
          echo ""
          echo "════════════════════════════════════════════════════════════════════════"
      
      # ════════════════════════════════════════════════════════════════════════
      # WORKFLOW SUMMARY
      # ════════════════════════════════════════════════════════════════════════
      
      - name: Generate Workflow Summary
        if: always()
        run: |
          echo "## 🤖 IGNIS Automation Test Agent - Run Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Agent status
          if [ "${{ steps.run-agent.outcome }}" == "success" ]; then
            echo "### ✅ Status: Success" >> $GITHUB_STEP_SUMMARY
          else
            echo "### ❌ Status: Failed" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Configuration
          echo "### ⚙️ Configuration" >> $GITHUB_STEP_SUMMARY
          echo "| Setting | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| AI Provider | ${{ github.event.inputs.ai-provider || vars.ATA_AI_PROVIDER || 'openai' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Code-Gen Claude | ${{ secrets.ATA_CODE_GENERATION_CLAUDE_API_KEY && 'Active' || 'Not configured (using primary)' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Run Mode | ${{ github.event.inputs.run-mode || 'full' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Run Agent | ${{ github.event.inputs.run-agent || 'N/A (full pipeline)' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Coverage Threshold | ${{ github.event.inputs.coverage-threshold || vars.ATA_COVERAGE_THRESHOLD || '95' }}% |" >> $GITHUB_STEP_SUMMARY
          echo "| Max Main Iterations | ${{ github.event.inputs.max-iterations || vars.ATA_MAX_ITERATIONS || '3' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Sub-Agent Max Iterations | ${{ github.event.inputs.sub-agent-max-iterations || vars.ATA_SUB_AGENT_MAX_ITERATIONS || '5' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Test Types | ${{ github.event.inputs.test-types || vars.ATA_TEST_TYPES || 'unit,e2e,api' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | ${{ github.event.inputs.branch || github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Skip PR | ${{ github.event.inputs.skip-pr || 'false' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Test results (if available)
          if [ -f "${{ github.workspace }}/test-results/ignis-summary.json" ]; then
            echo "### 📊 Results" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            
            # Extract key metrics
            UNIT_COV=$(cat "${{ github.workspace }}/test-results/ignis-summary.json" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('unitCoverage','N/A'))" 2>/dev/null || echo "N/A")
            AUTO_COV=$(cat "${{ github.workspace }}/test-results/ignis-summary.json" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('automationCoverage','N/A'))" 2>/dev/null || echo "N/A")
            TOTAL_TOKENS=$(cat "${{ github.workspace }}/test-results/ignis-summary.json" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('tokenUsage',{}).get('totalTokens','N/A'))" 2>/dev/null || echo "N/A")
            
            echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| Unit Coverage | ${UNIT_COV}% |" >> $GITHUB_STEP_SUMMARY
            echo "| Automation Coverage | ${AUTO_COV}% |" >> $GITHUB_STEP_SUMMARY
            echo "| Total Tokens Used | ${TOTAL_TOKENS} |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            
            echo "<details><summary>Full JSON Summary</summary>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```json' >> $GITHUB_STEP_SUMMARY
            cat "${{ github.workspace }}/test-results/ignis-summary.json" | python3 -m json.tool 2>/dev/null | head -80 >> $GITHUB_STEP_SUMMARY || cat "${{ github.workspace }}/test-results/ignis-summary.json" | head -80 >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "</details>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi
          
          # Generated files
          if [ -d "${{ github.workspace }}/generated-tests" ]; then
            TEST_COUNT=$(find "${{ github.workspace }}/generated-tests" -type f \( -name "*.spec.js" -o -name "*.test.js" -o -name "*.spec.ts" -o -name "*.test.ts" \) | wc -l)
            echo "### ✅ Generated $TEST_COUNT test files" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi
          
          # PR information
          SUMMARY_FILE=$(ls -t ${{ github.workspace }}/logs/run-summary-*.log 2>/dev/null | head -1)
          if [ -n "$SUMMARY_FILE" ]; then
            PR_URL=$(grep -oP 'prUrl["\s:]+\K[^",\s]+' "$SUMMARY_FILE" 2>/dev/null || echo "")
            if [ -n "$PR_URL" ] && [ "$PR_URL" != "null" ]; then
              echo "### 🔀 Pull Request" >> $GITHUB_STEP_SUMMARY
              echo "✅ [View Pull Request]($PR_URL)" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
            fi
          fi
          
          # Artifacts
          echo "### 📦 Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "Download test results, logs, and generated tests from the [Artifacts section](#artifacts) below." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Troubleshooting (if failed)
          if [ "${{ steps.run-agent.outcome }}" != "success" ]; then
            echo "### 🔍 Troubleshooting" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "1. Review the **Display Test Results** step for detailed output" >> $GITHUB_STEP_SUMMARY
            echo "2. Download artifacts to review logs locally" >> $GITHUB_STEP_SUMMARY
            echo "3. Check that \`ATA_AI_API_KEY\` is valid in repository secrets" >> $GITHUB_STEP_SUMMARY
            echo "4. Verify application can start with provided configuration" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi
