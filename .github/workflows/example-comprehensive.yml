# # Configuration Notes:
# # ═══════════════════════════════════════════════════════════════════
# #
# # Required Secrets (configure in repository settings):
# # - CLAUDE_API_KEY, OPENAI_API_KEY, or GEMINI_API_KEY
# #
# # Optional Secrets:
# # - APP_SECRETS: JSON object with application secrets
# # - APP_URL: URL of the running application (if not auto-starting)
# # - APP_START_COMMAND: Custom command to start your app
# # - APP_PORT: Port your application runs on
# # - SLACK_WEBHOOK_URL: For Slack notifications
# # - TEAMS_WEBHOOK_URL: For Microsoft Teams notifications
# #
# # Customization:
# # - Adjust TEST_TYPES to enable/disable specific test types
# # - Modify MAX_ITERATIONS based on your needs (higher = more fixes)
# # - Change schedule cron expression for different run times
# # - Add/remove notification channels as needed
# #
